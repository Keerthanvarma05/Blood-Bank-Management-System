<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Blood Inventory | Blood Bank Management System</title>

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">

    <link rel="stylesheet"
        href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.2/css/all.min.css">

    <link rel="stylesheet" href="../css/inventory.css">

</head>

<body>

<header>

    <nav class="navbar">

        <div class="logo">

            <i class="fa-solid fa-droplet"></i>

            <span>Blood Bank</span>

        </div>

        <ul class="nav-links">

            <li><a href="../index.html">Home</a></li>
            <li><a href="about.html">About</a></li>
            <li><a href="blood-availability.html">Blood Availability</a></li>
            <li><a href="contact.html">Contact</a></li>

        </ul>

        <div class="nav-buttons">

            <button class="login-btn"
                onclick="window.location.href='login.html'">

                Login

            </button>

            <button class="register-btn"
                onclick="window.location.href='register.html'">

                Register

            </button>

        </div>

    </nav>

</header>

<section class="inventory-section">

    <h1>Blood Inventory Management</h1>

    <p>Add and manage blood stock.</p>

    <form id="inventoryForm">

        <div class="form-group">

            <label>Blood Bank</label>

            <select id="bankId" required>

                <option value="">Select Blood Bank</option>

            </select>

        </div>

        <div class="form-group">

            <label>Blood Group</label>

            <select id="bloodGroup" required>

                <option value="">Select Blood Group</option>

                <option>A+</option>
                <option>A-</option>
                <option>B+</option>
                <option>B-</option>
                <option>AB+</option>
                <option>AB-</option>
                <option>O+</option>
                <option>O-</option>

            </select>

        </div>

        <div class="form-group">

            <label>Available Units</label>

            <input
                type="number"
                id="units"
                min="1"
                required>

        </div>

        <div class="form-group">

            <label>Expiry Date</label>

            <input
                type="date"
                id="expiryDate"
                required>

        </div>

        <button
            type="submit"
            class="submit-btn">

            <i class="fa-solid fa-plus"></i>

            Add Inventory

        </button>

    </form>

</section>

<section class="table-section">

    <h2>Blood Inventory</h2>

    <table>

        <thead>

            <tr>

                <th>Blood Bank</th>
                <th>City</th>
                <th>Blood Group</th>
                <th>Units</th>
                <th>Expiry Date</th>
                <th>Action</th>

            </tr>

        </thead>

        <tbody id="inventoryTable">

        </tbody>

    </table>

</section>

<footer>

    <h2>Blood Bank Management System</h2>

    <p>Every Drop Counts ❤️</p>

    <p>© 2026 Blood Bank Management System</p>

</footer>

<script src="../js/inventory.js"></script>

</body>

</html>

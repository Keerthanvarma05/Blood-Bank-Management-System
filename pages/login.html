<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Login | Blood Bank Management System</title>

    <!-- Google Font -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">

    <!-- Font Awesome -->
    <link rel="stylesheet"
        href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.2/css/all.min.css">

    <!-- CSS -->
    <link rel="stylesheet" href="../css/login.css">

</head>

<body>

    <!-- ================= TOP BAR ================= -->

    <div class="top-bar">

        <a href="../index.html" class="home-btn">
            <i class="fa-solid fa-house"></i>
            Home
        </a>

        <a href="register.html" class="login-btn-top">
            Register
        </a>

    </div>

    <!-- ================= LOGIN CONTAINER ================= -->

    <div class="container">

        <!-- LEFT SIDE -->

        <div class="left">

            <img src="../images/login-illustration.svg" alt="Blood Donation">

            <h1>Blood Bank Management System</h1>

            <p>
                Donate blood, save lives and become someone's hero.
            </p>

        </div>

        <!-- RIGHT SIDE -->

        <div class="right">

            <form id="loginForm">

                <h2>Welcome Back</h2>

                <p>Login to continue</p>

                <div class="input-box">

                    <i class="fa-solid fa-envelope"></i>

                    <input
                        type="email"
                        id="email"
                        name="email"
                        placeholder="Email Address"
                        required>

                </div>

                <div class="input-box">

                    <i class="fa-solid fa-lock"></i>

                    <input
                        type="password"
                        id="password"
                        name="password"
                        placeholder="Password"
                        required>

                    <i class="fa-solid fa-eye eye" id="togglePassword"></i>

                </div>

                <div class="options">

                    <label>
                        <input type="checkbox">
                        Remember Me
                    </label>

                    <a href="#">
                        Forgot Password?
                    </a>

                </div>

                <button type="submit">
                    Login
                </button>

                <div class="register-link">

                    Don't have an account?

                    <a href="register.html">
                        Register
                    </a>

                </div>

            </form>

        </div>

    </div>

    <script src="../js/login.js"></script>

</body>

</html>

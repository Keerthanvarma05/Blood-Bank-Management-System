<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Donor Management | Blood Bank Management System</title>

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">

    <link rel="stylesheet"
        href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.2/css/all.min.css">

    <link rel="stylesheet" href="../css/donor.css">

</head>

<body>

<header>

    <nav class="navbar">

        <div class="logo">

            <i class="fa-solid fa-droplet"></i>

            <span>Blood Bank</span>

        </div>

        <ul class="nav-links">

            <li><a href="../index.html">Home</a></li>
            <li><a href="about.html">About</a></li>
            <li><a href="blood-availability.html">Blood Availability</a></li>
            <li><a href="contact.html">Contact</a></li>

        </ul>

        <div class="nav-buttons">

            <button class="login-btn"
                onclick="window.location.href='login.html'">

                Login

            </button>

            <button class="register-btn"
                onclick="window.location.href='register.html'">

                Register

            </button>

        </div>

    </nav>

</header>

<section class="donor-section">

    <h1>Donor Management</h1>

    <p>Add and manage blood donors.</p>

    <form id="donorForm">

        <div class="form-group">

            <label>Full Name</label>

            <input type="text" id="fullName" required>

        </div>

        <div class="form-group">

            <label>Age</label>

            <input type="number" id="age" required>

        </div>

        <div class="form-group">

            <label>Gender</label>

            <select id="gender" required>

                <option value="">Select Gender</option>

                <option>Male</option>
                <option>Female</option>
                <option>Other</option>

            </select>

        </div>

        <div class="form-group">

            <label>Blood Group</label>

            <select id="bloodGroup" required>

                <option value="">Select Blood Group</option>

                <option>A+</option>
                <option>A-</option>
                <option>B+</option>
                <option>B-</option>
                <option>AB+</option>
                <option>AB-</option>
                <option>O+</option>
                <option>O-</option>

            </select>

        </div>

        <div class="form-group">

            <label>Phone Number</label>

            <input type="text" id="phone" required>

        </div>

        <div class="form-group">

            <label>Email</label>

            <input type="email" id="email" required>

        </div>

        <div class="form-group">

            <label>City</label>

            <input type="text" id="city" required>

        </div>

        <div class="form-group full-width">

            <label>Address</label>

            <textarea id="address" rows="4"></textarea>

        </div>

        <div class="form-group">

            <label>Last Donation Date</label>

            <input type="date" id="lastDonation">

        </div>

        <button type="submit" class="submit-btn">

            <i class="fa-solid fa-user-plus"></i>

            Add Donor

        </button>

    </form>

</section>

<section class="table-section">

    <h2>Registered Donors</h2>

    <table>

        <thead>

            <tr>

                <th>Name</th>
                <th>Age</th>
                <th>Gender</th>
                <th>Blood</th>
                <th>Phone</th>
                <th>City</th>
                <th>Last Donation</th>
                <th>Actions</th>

            </tr>

        </thead>

        <tbody id="donorTable">

        </tbody>

    </table>

</section>

<footer>

    <h2>Blood Bank Management System</h2>

    <p>Every Drop Counts ❤️</p>

    <p>© 2026 Blood Bank Management System</p>

</footer>

<script src="../js/donor.js"></script>

</body>

</html>

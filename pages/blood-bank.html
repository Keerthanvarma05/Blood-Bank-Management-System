<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Blood Bank Management | Blood Bank Management System</title>

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">

    <link rel="stylesheet"
        href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.2/css/all.min.css">

    <link rel="stylesheet" href="../css/blood-bank.css">

</head>

<body>

<header>

    <nav class="navbar">

        <div class="logo">

            <i class="fa-solid fa-droplet"></i>

            <span>Blood Bank</span>

        </div>

        <ul class="nav-links">

            <li><a href="../index.html">Home</a></li>
            <li><a href="about.html">About</a></li>
            <li><a href="blood-availability.html">Blood Availability</a></li>
            <li><a href="contact.html">Contact</a></li>

        </ul>

        <div class="nav-buttons">

            <button class="login-btn"
                onclick="window.location.href='login.html'">

                Login

            </button>

            <button class="register-btn"
                onclick="window.location.href='register.html'">

                Register

            </button>

        </div>

    </nav>

</header>

<section class="bank-section">

    <h1>Blood Bank Management</h1>

    <p>Add and manage blood banks.</p>

    <form id="bankForm">

        <div class="form-group">

            <label>Blood Bank Name</label>

            <input type="text" id="bankName" required>

        </div>

        <div class="form-group">

            <label>Manager Name</label>

            <input type="text" id="managerName" required>

        </div>

        <div class="form-group">

            <label>Email</label>

            <input type="email" id="email" required>

        </div>

        <div class="form-group">

            <label>Phone</label>

            <input type="text" id="phone" required>

        </div>

        <div class="form-group">

            <label>City</label>

            <input type="text" id="city" required>

        </div>

        <div class="form-group">

            <label>Capacity (Units)</label>

            <input type="number" id="capacity" required>

        </div>

        <div class="form-group full-width">

            <label>Address</label>

            <textarea id="address" rows="4" required></textarea>

        </div>

        <button type="submit" class="submit-btn">

            <i class="fa-solid fa-hospital"></i>

            Add Blood Bank

        </button>

    </form>

</section>

<section class="table-section">

    <h2>Blood Banks</h2>

    <table>

        <thead>

            <tr>

                <th>Name</th>
                <th>Manager</th>
                <th>Email</th>
                <th>Phone</th>
                <th>City</th>
                <th>Capacity</th>
                <th>Actions</th>

            </tr>

        </thead>

        <tbody id="bankTable">

        </tbody>

    </table>

</section>

<footer>

    <h2>Blood Bank Management System</h2>

    <p>Every Drop Counts ❤️</p>

    <p>© 2026 Blood Bank Management System</p>

</footer>

<script src="../js/blood-bank.js"></script>

</body>

</html>

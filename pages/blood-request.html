<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Blood Request | Blood Bank Management System</title>

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">

    <link rel="stylesheet"
        href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.2/css/all.min.css">

    <link rel="stylesheet" href="../css/request.css">

</head>

<body>

<header>

    <nav class="navbar">

        <div class="logo">
            <i class="fa-solid fa-droplet"></i>
            <span>Blood Bank</span>
        </div>

        <ul class="nav-links">
            <li><a href="../index.html">Home</a></li>
            <li><a href="about.html">About</a></li>
            <li><a href="blood-availability.html">Blood Availability</a></li>
            <li><a href="contact.html">Contact</a></li>
        </ul>

        <div class="nav-buttons">

            <button class="login-btn" onclick="window.location.href='login.html'">
                Login
            </button>

            <button class="register-btn" onclick="window.location.href='register.html'">
                Register
            </button>

        </div>

    </nav>

</header>

<section class="request-section">

    <h1>Blood Request Form</h1>

    <p>Fill in the details to request blood.</p>

    <form id="requestForm">

        <div class="form-group">
            <label>Patient Name</label>
            <input type="text" id="patientName" required>
        </div>

        <div class="form-group">
            <label>Hospital Name</label>
            <input type="text" id="hospitalName" required>
        </div>

        <div class="form-group">
            <label>Blood Group</label>
            <select id="bloodGroup" required>
                <option value="">Select Blood Group</option>
                <option>A+</option>
                <option>A-</option>
                <option>B+</option>
                <option>B-</option>
                <option>AB+</option>
                <option>AB-</option>
                <option>O+</option>
                <option>O-</option>
            </select>
        </div>

        <div class="form-group">
            <label>Units Required</label>
            <input type="number" id="units" min="1" required>
        </div>

        <div class="form-group">
            <label>City</label>
            <input type="text" id="city" required>
        </div>

        <div class="form-group">
            <label>Contact Number</label>
            <input type="tel" id="contact" required>
        </div>

        <div class="form-group">
            <label>Email</label>
            <input type="email" id="email" required>
        </div>

        <div class="form-group">
            <label>Required Date</label>
            <input type="date" id="date" required>
        </div>

        <div class="form-group full-width">
            <label>Remarks</label>
            <textarea id="remarks" rows="4"></textarea>
        </div>

        <button type="submit" class="submit-btn">
            Submit Request
        </button>

    </form>
<hr style="margin:50px 0;">

<h2>Blood Request List</h2>

<table id="requestTable">

    <thead>

        <tr>

            <th>Patient</th>
            <th>Blood Group</th>
            <th>Units</th>
            <th>City</th>
            <th>Status</th>
            <th>Actions</th>

        </tr>

    </thead>

    <tbody>

    </tbody>

</table>
</section>

<footer>

    <h2>Blood Bank Management System</h2>

    <p>Every Drop Counts ❤️</p>

    <p>© 2026 Blood Bank Management System</p>

</footer>

<script src="../js/request.js"></script>

</body>

</html>

<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Register | Blood Bank Management System</title>

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap"
        rel="stylesheet">

    <link rel="stylesheet"
        href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.2/css/all.min.css">

    <link rel="stylesheet" href="../css/register.css">

</head>

<body>

    <div class="top-bar">

        <a href="../index.html" class="home-btn">
            <i class="fa-solid fa-house"></i>
            Home
        </a>

        <a href="login.html" class="login-btn-top">
            Login
        </a>

    </div>

    <div class="container">

        <div class="left">

            <img src="../images/login-illustration.svg" alt="Blood Donation">

            <h1>Blood Bank Management System</h1>

            <p>
                Join our community of blood donors and help save lives.
            </p>

        </div>

        <div class="right">

            <form id="registerForm">

                <h2>Create Account</h2>

                <p>Register to become a donor</p>

                <div class="input-box">

                    <i class="fa-solid fa-user"></i>

                    <input
                        type="text"
                        id="fullName"
                        name="fullname"
                        placeholder="Full Name"
                        required>

                </div>

                <div class="input-box">

                    <i class="fa-solid fa-envelope"></i>

                    <input
                        type="email"
                        id="email"
                        name="email"
                        placeholder="Email Address"
                        required>

                </div>

                <div class="input-box">

                    <i class="fa-solid fa-phone"></i>

                    <input
                        type="tel"
                        id="phone"
                        name="phone"
                        placeholder="Mobile Number"
                        required>

                </div>

                <div class="input-box">

                    <i class="fa-solid fa-droplet"></i>

                    <select
                        id="bloodGroup"
                        name="bloodGroup"
                        required>

                        <option value="">Select Blood Group</option>

                        <option>A+</option>
                        <option>A-</option>
                        <option>B+</option>
                        <option>B-</option>
                        <option>AB+</option>
                        <option>AB-</option>
                        <option>O+</option>
                        <option>O-</option>

                    </select>

                </div>

                <div class="input-box">

                    <i class="fa-solid fa-lock"></i>

                    <input
                        type="password"
                        id="password"
                        name="password"
                        placeholder="Password"
                        required>

                    <i class="fa-solid fa-eye eye" id="togglePassword"></i>

                </div>

                <div class="input-box">

                    <i class="fa-solid fa-lock"></i>

                    <input
                        type="password"
                        id="confirmPassword"
                        placeholder="Confirm Password"
                        required>

                </div>

                <button type="submit">

                    Register

                </button>

                <div class="register-link">

                    Already have an account?

                    <a href="login.html">

                        Login

                    </a>

                </div>

            </form>

        </div>

    </div>

    <script src="../js/register.js"></script>

</body>

</html>
